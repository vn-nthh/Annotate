<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annotate</title>
  <link rel="icon" type="image/png" href="./annotate.png" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./index.css" />
</head>
<body>
  <div class="app">
    <!-- Draggable Header -->
    <header class="titlebar" data-tauri-drag-region>
      <img src="./annotate_logowithtext_solid.svg" alt="Annotate" class="logo logo-light" />
      <img src="./annotate_logowithtext_white.svg" alt="Annotate" class="logo logo-dark" />
      <div class="titlebar-controls">
        <button class="titlebar-btn" id="titlebar-minimize" title="Minimize">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="titlebar-btn titlebar-close" id="titlebar-close" title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="app-body">
      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="home" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span>Home</span>
          </button>
          <button class="tab-btn" data-tab="dictionary" title="Dictionary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
              <line x1="8" y1="7" x2="16" y2="7"/>
              <line x1="8" y1="11" x2="13" y2="11"/>
            </svg>
            <span>Dictionary</span>
          </button>
          <button class="tab-btn" data-tab="settings" title="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            <span>Settings</span>
          </button>
        </div>
        <!-- Status dot at bottom of sidebar -->
        <div class="sidebar-bottom">
          <div class="sidebar-status">
            <span id="status-dot" class="status-dot"></span>
            <span id="status-text" class="status-text">Ready</span>
          </div>
        </div>
      </nav>

    <!-- Main Content -->
    <main class="content">

      <!-- Home Tab -->
      <section class="tab-panel active" id="tab-home">
        <div class="panel-header">
          <h2>Transcription History</h2>
          <span class="history-count" id="history-count"></span>
        </div>
        <div class="history-container">
          <ul class="history-list" id="history-list"></ul>
        </div>
        <button class="history-clear" id="history-clear" style="display:none;">Clear all</button>
      </section>

      <!-- Dictionary Tab -->
      <section class="tab-panel" id="tab-dictionary">
        <div class="panel-header">
          <h2>Dictionary</h2>
          <span class="dict-count" id="dict-count"></span>
        </div>
        <p class="panel-desc">Add key terms to improve transcription accuracy. These are sent as context to the Whisper model.</p>
        <div class="dict-input-row">
          <input type="text" id="dict-input" placeholder="Add a term…" spellcheck="false" autocomplete="off" />
          <button id="dict-add-btn" class="dict-add-btn">Add</button>
        </div>
        <div class="dict-container">
          <ul class="dict-list" id="dict-list"></ul>
        </div>
      </section>

      <!-- Settings Tab -->
      <section class="tab-panel" id="tab-settings">
        <div class="panel-header">
          <h2>Settings</h2>
        </div>

        <!-- Microphone -->
        <section class="setting-group">
          <label class="setting-label" for="mic-select">Microphone</label>
          <div class="select-wrap">
            <select id="mic-select">
              <option value="">Loading devices…</option>
            </select>
            <span class="select-arrow">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
          </div>
        </section>

        <hr class="divider" />

        <!-- Transcription Engine -->
        <section class="setting-group">
          <label class="setting-label" for="mode-select">Audio Engine</label>
          <div class="select-wrap">
            <select id="mode-select">
              <option value="webspeech">Web Speech (built-in)</option>
              <option value="groq">Groq Whisper</option>
            </select>
            <span class="select-arrow">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </span>
          </div>
        </section>

        <!-- Groq API Key (conditional) -->
        <div id="section-apikey" style="display: none;">
          <hr class="divider" id="divider-apikey" />
          <section class="setting-group">
            <label class="setting-label" for="apikey-input">API Key</label>
            <div class="input-wrap">
              <input
                type="password"
                id="apikey-input"
                placeholder="Paste Groq API key"
                spellcheck="false"
                autocomplete="off"
              />
              <button id="apikey-toggle" class="icon-btn" title="Show/hide key">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </section>
        </div>

        <hr class="divider" />

        <!-- Appearance -->
        <section class="setting-group">
          <div class="theme-toggle-row">
            <div class="theme-toggle-info">
              <span class="theme-toggle-label">Dark Mode</span>
              <span class="theme-toggle-desc">Switch to a darker color scheme</span>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="theme-toggle" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </section>

        <hr class="divider" />

        <!-- Hotkey -->
        <section class="setting-group">
          <label class="setting-label">Hotkey</label>
          <button id="hotkey-btn" class="hotkey-recorder">
            <span id="hotkey-display">Click to record</span>
          </button>
        </section>

      </section>
    </main>
    </div><!-- /app-body -->
  </div>

  <!-- Close Prompt Modal -->
  <div class="modal-overlay" id="close-modal" style="display:none;">
    <div class="modal-card">
      <p class="modal-title">Close Annotate?</p>
      <p class="modal-desc">Choose how to exit the application.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-secondary" id="modal-tray">Minimize to Tray</button>
        <button class="modal-btn modal-btn-danger" id="modal-quit">Quit</button>
      </div>
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
