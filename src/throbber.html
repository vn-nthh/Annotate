<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pill {
      width: 72px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgb(18, 18, 18);
      border-radius: 16px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      transition: transform 0.08s ease-out, border-radius 0.08s ease-out;
      will-change: transform;
    }
  </style>
</head>
<body>
  <div class="pill">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <script>
    const dots = [
      document.getElementById('d0'),
      document.getElementById('d1'),
      document.getElementById('d2'),
      document.getElementById('d3'),
    ];

    let audioCtx = null;
    let analyser = null;
    let dataArray = null;
    let stream = null;
    let animId = null;
    // Phase offsets for each dot so they move in a wave
    const offsets = [0, 0.8, 1.6, 2.4];

    // Tear down the current audio pipeline fully
    function stopAudio() {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      if (audioCtx) { try { audioCtx.close(); } catch {} audioCtx = null; }
      analyser = null;
      dataArray = null;
    }

    // Acquire a FRESH stream (picks up current process default device)
    async function startListening() {
      stopAudio(); // always clean up first
      try {
        // No deviceId — deliberately asks for the process default,
        // which is managed by Windows audio policy in the Rust backend
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.6;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        animate();
      } catch (e) {
        // Fallback: just do idle animation
        animateIdle();
      }
    }

    function getEnergy() {
      analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      // Focus on speech frequencies (first ~40 bins ≈ 0-3kHz)
      const bins = Math.min(40, dataArray.length);
      for (let i = 0; i < bins; i++) {
        sum += dataArray[i];
      }
      return sum / (bins * 255); // 0..1
    }

    function animate() {
      const energy = getEnergy();
      const t = performance.now() / 1000;

      dots.forEach((dot, i) => {
        // Idle: gentle wave, Speaking: bigger bounce + stretch
        const wave = Math.sin(t * 3.5 + offsets[i]);

        // Bounce height: 1-3px idle, up to 8px when loud
        const bounce = wave * (0.6 + energy * 2.0);

        // Vertical stretch: 1x idle, up to 2.2x when loud
        const stretch = 1 + energy * 1.8;

        dot.style.transform = `translateY(${bounce}px) scaleY(${stretch})`;
        dot.style.borderRadius = stretch > 1.15 ? '40%' : '50%';
      });

      animId = requestAnimationFrame(animate);
    }

    function animateIdle() {
      const t = performance.now() / 1000;
      dots.forEach((dot, i) => {
        const wave = Math.sin(t * 2.5 + offsets[i]);
        dot.style.transform = `translateY(${wave * 1.5}px)`;
      });
      animId = requestAnimationFrame(animateIdle);
    }

    // Re-acquire the stream every time the window is made visible.
    // This is the key fix: since device switching happens via Windows audio
    // policy (not getUserMedia deviceId), we must call getUserMedia() fresh
    // each time to pick up the current process default device.
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        startListening();
      } else {
        stopAudio();
      }
    });

    // Initial acquire in case the window is already visible when loaded
    if (document.visibilityState === 'visible') {
      startListening();
    }
  </script>
</body>
</html>
